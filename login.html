<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POS DZ - تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    /* أنيميشن متقدم */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      margin: 0;
      background: var(--bg-dark);
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.15;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.15;
      }
      90% {
        opacity: 0.1;
      }
      100% {
        transform: translateY(-20px) scale(1.2);
        opacity: 0;
      }
    }

    .glow-ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(124, 58, 237, 0.15);
      animation: pulseRing 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pulseRing {
      0%, 100% {
        transform: scale(1);
        opacity: 0.15;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.25;
      }
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow);
      backdrop-filter: blur(10px);
    }

    .card-glow-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary-light));
    }

    .card-body {
      padding: 36px 36px 28px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin-bottom: 4px;
    }

    .brand-pos {
      font-family: Impact, sans-serif;
      font-size: 3.2rem;
      color: var(--text-primary);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .brand-dz {
      font-family: Impact, sans-serif;
      font-size: 3.2rem;
      color: var(--primary);
      text-shadow: 0 0 24px var(--glow);
    }

    .brand-sub {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .divider-line {
      height: 1px;
      background: var(--border);
      margin: 0 0 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field-wrap {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .field-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
    }

    .field-icon {
      padding: 0 12px;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .field-wrap input,
    .field-wrap select {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      padding: 12px 8px 12px 0;
      font-family: var(--font-main);
      font-size: 0.98rem;
      direction: rtl;
    }

    .field-wrap select option {
      background: var(--bg-card);
    }

    .toggle-eye {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 12px;
      transition: color 0.2s;
    }

    .toggle-eye:hover {
      color: var(--primary);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .remember-row input[type=checkbox] {
      accent-color: var(--primary);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .remember-row label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: var(--font-main);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn-login:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(124, 58, 237, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.88rem;
      text-align: center;
      margin-top: 12px;
      min-height: 24px;
      font-weight: 600;
    }

    .card-footer {
      padding: 16px 36px 20px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .card-footer p {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .login-attempts {
      font-size: 0.75rem;
      color: var(--warning);
      text-align: center;
      margin-top: 8px;
    }

    .sidebar,
    .sidebar-overlay {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- خلفية متحركة -->
  <div class="particles" id="particles"></div>
  
  <!-- حلقات مضيئة -->
  <div class="glow-ring" style="width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:0s;"></div>
  <div class="glow-ring" style="width:700px;height:700px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.3s;"></div>
  <div class="glow-ring" style="width:900px;height:900px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:2.6s;"></div>

  <!-- بطاقة تسجيل الدخول -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="card-glow-bar"></div>
      
      <div class="card-body">
        <!-- العلامة التجارية -->
        <div class="brand">
          <span class="brand-pos">POS</span>
          <span class="brand-dz">DZ</span>
        </div>
        <p class="brand-sub">نظام نقاط البيع الذكي</p>
        
        <div class="divider-line"></div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
          <!-- اسم المستخدم -->
          <div class="form-group">
            <label class="form-label">👤 اسم المستخدم</label>
            <div class="field-wrap">
              <span class="field-icon">◉</span>
              <select id="usernameSelect" required>
                <option value="">-- اختر المستخدم --</option>
              </select>
            </div>
          </div>

          <!-- كلمة المرور -->
          <div class="form-group">
            <label class="form-label">🔑 الرقم السري</label>
            <div class="field-wrap">
              <span class="field-icon">🔒</span>
              <input type="password" 
                     id="passwordInput" 
                     placeholder="أدخل الرقم السري" 
                     autocomplete="current-password"
                     required/>
              <button type="button" class="toggle-eye" id="toggleEye" onclick="togglePassword()">👁</button>
            </div>
          </div>

          <!-- تذكرني -->
          <div class="remember-row">
            <input type="checkbox" id="rememberMe" checked/>
            <label for="rememberMe">حفظ بيانات الدخول</label>
          </div>

          <!-- زر الدخول -->
          <button type="submit" class="btn-login" id="loginButton">
            <span>دخول</span>
            <i class="fa-solid fa-arrow-left"></i>
          </button>

          <!-- رسائل الخطأ -->
          <div class="error-msg" id="errorMsg"></div>
          <div class="login-attempts" id="attemptsMsg"></div>
        </form>
      </div>

      <!-- تذييل -->
      <div class="card-footer">
        <p>POS DZ v8.0.0 &nbsp;|&nbsp; 2026 POS DZ — جميع الحقوق محفوظة ®</p>
      </div>
    </div>
  </div>

  <!-- لوحة المفاتيح الافتراضية (لأجهزة اللمس) -->
  <div class="vkb-overlay" id="vkbOverlay">
    <div class="vkb-container">
      <div class="vkb-row">
        <button class="vkb-key" onclick="vkbPress('1')">1</button>

        <button class="vkb-key" onclick="vkbPress('3')">3</button>
        <button class="vkb-key" onclick="vkbPress('4')">4</button>
        <button class="vkb-key" onclick="vkbPress('5')">5</button>
        <button class="vkb-key" onclick="vkbPress('6')">6</button>
        <button class="vkb-key" onclick="vkbPress('7')">7</button>
        <button class="vkb-key" onclick="vkbPress('8')">8</button>
        <button class="vkb-key" onclick="vkbPress('9')">9</button>
        <button class="vkb-key" onclick="vkbPress('0')">0</button>
        <button class="vkb-key delete" onclick="vkbPress('⌫')">⌫</button>
      </div>
      <div class="vkb-row">
        <button class="vkb-key" onclick="vkbPress('ض')">ض</button>
        <button class="vkb-key" onclick="vkbPress('ص')">ص</button>
        <button class="vkb-key" onclick="vkbPress('ث')">ث</button>
        <button class="vkb-key" onclick="vkbPress('ق')">ق</button>
        <button class="vkb-key" onclick="vkbPress('ف')">ف</button>
        <button class="vkb-key" onclick="vkbPress('غ')">غ</button>
        <button class="vkb-key" onclick="vkbPress('ع')">ع</button>
        <button class="vkb-key" onclick="vkbPress('ه')">ه</button>
        <button class="vkb-key" onclick="vkbPress('خ')">خ</button>
        <button class="vkb-key" onclick="vkbPress('ح')">ح</button>
        <button class="vkb-key" onclick="vkbPress('ج')">ج</button>
      </div>
      <div class="vkb-row">
        <button class="vkb-key" onclick="vkbPress('ش')">ش</button>
        <button class="vkb-key" onclick="vkbPress('س')">س</button>
        <button class="vkb-key" onclick="vkbPress('ي')">ي</button>
        <button class="vkb-key" onclick="vkbPress('ب')">ب</button>
        <button class="vkb-key" onclick="vkbPress('ل')">ل</button>
        <button class="vkb-key" onclick="vkbPress('ا')">ا</button>
        <button class="vkb-key" onclick="vkbPress('ت')">ت</button>
        <button class="vkb-key" onclick="vkbPress('ن')">ن</button>
        <button class="vkb-key" onclick="vkbPress('م')">م</button>
        <button class="vkb-key" onclick="vkbPress('ك')">ك</button>
        <button class="vkb-key" onclick="vkbPress('ط')">ط</button>
      </div>
      <div class="vkb-row">
        <button class="vkb-key" onclick="vkbPress('A')">A</button>
        <button class="vkb-key" onclick="vkbPress('B')">B</button>
        <button class="vkb-key" onclick="vkbPress('C')">C</button>
        <button class="vkb-key" onclick="vkbPress('D')">D</button>
        <button class="vkb-key" onclick="vkbPress('E')">E</button>
        <button class="vkb-key" onclick="vkbPress('F')">F</button>
        <button class="vkb-key" onclick="vkbPress('G')">G</button>
        <button class="vkb-key" onclick="vkbPress('H')">H</button>
        <button class="vkb-key space wide" onclick="vkbPress(' ')">مسافة</button>
        <button class="vkb-key enter-key" onclick="doLogin()" style="background:var(--primary);color:#fff;font-weight:800;min-width:70px;">دخول ↵</button>
        <button class="vkb-key close" onclick="vkbClose()">✖ إغلاق</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // ══════════════════════════════════════════════════════════════
    //  نظام تسجيل الدخول المحسّن
    // ══════════════════════════════════════════════════════════════
    
    // ثوابت الأمان
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_TIME = 5 * 60 * 1000; // 5 دقائق
    const ATTEMPTS_KEY = 'posdz_login_attempts_v2';

    // متغيرات الحالة
    let lockTimer = null;
    let loginAttempts = {
      count: 0,
      lockedUntil: 0
    };

    // ══════════════════════════════════════════════════════════════
    //  تهيئة الصفحة
    // ══════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', async () => {
      // إنشاء الجسيمات المتحركة
      createParticles();
      
      // فتح قاعدة البيانات
      await window.dbManager.open();
      
      // تطبيق الثيم
      if (window.themeManager) {
        await window.themeManager.apply();
      }
      
      // تحميل المستخدمين
      await loadUsers();
      
      // استعادة آخر مستخدم
      const savedUser = localStorage.getItem('posdz_last_user');
      if (savedUser) {
        document.getElementById('usernameSelect').value = savedUser;
      }
      
      // التحقق من وجود إقفال سابق
      checkLockStatus();
      
      // تهيئة لوحة المفاتيح الافتراضية
      initVirtualKeyboard();
    });

    // ══════════════════════════════════════════════════════════════
    //  إنشاء الجسيمات المتحركة
    // ══════════════════════════════════════════════════════════════
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['var(--primary)', 'var(--secondary)', 'var(--primary-light)'];
      
      for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const size = Math.random() * 10 + 3;
        const duration = Math.random() * 12 + 8;
        const delay = Math.random() * 8;
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        particle.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
          background: ${color};
        `;
        
        container.appendChild(particle);
      }
    }

    // ══════════════════════════════════════════════════════════════
    //  إدارة محاولات الدخول
    // ══════════════════════════════════════════════════════════════
    function loadAttempts() {
      try {
        const saved = localStorage.getItem(ATTEMPTS_KEY);
        if (saved) {
          loginAttempts = JSON.parse(saved);
        }
      } catch (e) {
        loginAttempts = { count: 0, lockedUntil: 0 };
      }
    }

    function saveAttempts() {
      try {
        localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(loginAttempts));
      } catch (e) {
        console.warn('فشل في حفظ محاولات الدخول');
      }
    }

    function checkLockStatus() {
      loadAttempts();
      
      const now = Date.now();
      const errorMsg = document.getElementById('errorMsg');
      const attemptsMsg = document.getElementById('attemptsMsg');
      const loginBtn = document.getElementById('loginButton');
      const passwordInput = document.getElementById('passwordInput');
      
      if (loginAttempts.lockedUntil && now < loginAttempts.lockedUntil) {
        // الحساب مقفل
        const remaining = Math.ceil((loginAttempts.lockedUntil - now) / 1000);
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        
        errorMsg.textContent = `🔒 الحساب مقفل مؤقتاً`;
        attemptsMsg.textContent = `الرجاء الانتظار ${minutes}:${seconds.toString().padStart(2, '0')}`;
        
        loginBtn.disabled = true;
        passwordInput.disabled = true;
        
        // بدء العد التنازلي
        startLockCountdown();
      } else {
        // إعادة تعيين إذا انتهى وقت الإقفال
        if (loginAttempts.lockedUntil) {
          resetAttempts();
        }
        
        const remaining = MAX_ATTEMPTS - loginAttempts.count;
        if (remaining < MAX_ATTEMPTS) {
          attemptsMsg.textContent = `❌ ${remaining} محاولة متبقية`;
        }
      }
    }

    function startLockCountdown() {
      if (lockTimer) clearInterval(lockTimer);
      
      lockTimer = setInterval(() => {
        const now = Date.now();
        const errorMsg = document.getElementById('errorMsg');
        const attemptsMsg = document.getElementById('attemptsMsg');
        const loginBtn = document.getElementById('loginButton');
        const passwordInput = document.getElementById('passwordInput');
        
        if (!loginAttempts.lockedUntil || now >= loginAttempts.lockedUntil) {
          // انتهى الإقفال
          clearInterval(lockTimer);
          resetAttempts();
          errorMsg.textContent = '';
          attemptsMsg.textContent = '';
          loginBtn.disabled = false;
          passwordInput.disabled = false;
          return;
        }
        
        const remaining = Math.ceil((loginAttempts.lockedUntil - now) / 1000);
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        
        attemptsMsg.textContent = `⏳ ${minutes}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function recordFailedAttempt() {
      loginAttempts.count++;
      
      if (loginAttempts.count >= MAX_ATTEMPTS) {
        loginAttempts.lockedUntil = Date.now() + LOCKOUT_TIME;
        saveAttempts();
        checkLockStatus();
      } else {
        saveAttempts();
      }
      
      const remaining = MAX_ATTEMPTS - loginAttempts.count;
      document.getElementById('attemptsMsg').textContent = `❌ ${remaining} محاولة متبقية`;
    }

    function resetAttempts() {
      loginAttempts = { count: 0, lockedUntil: 0 };
      saveAttempts();
      document.getElementById('attemptsMsg').textContent = '';
    }

    // ══════════════════════════════════════════════════════════════
    //  تحميل المستخدمين
    // ══════════════════════════════════════════════════════════════
    async function loadUsers() {
      try {
        const users = await window.dbManager.getAll('users');
        const select = document.getElementById('usernameSelect');
        
        select.innerHTML = '<option value="">-- اختر المستخدم --</option>';
        
        users.sort((a, b) => {
          if (a.role === 'admin') return -1;
          if (b.role === 'admin') return 1;
          return a.username.localeCompare(b.username);
        });
        
        users.forEach(user => {
          const option = document.createElement('option');
          option.value = user.username;
          
          // إضافة أيقونة حسب الصلاحية
          const roleIcon = user.role === 'admin' ? ' 👑' : 
                          user.role === 'manager' ? ' 🛡️' : ' 👤';
          
          option.textContent = user.username + roleIcon;
          select.appendChild(option);
        });
        
      } catch (e) {
        console.error('فشل في تحميل المستخدمين:', e);
        document.getElementById('errorMsg').textContent = '⚠️ خطأ في تحميل المستخدمين';
      }
    }

    // ══════════════════════════════════════════════════════════════
    //  تسجيل الدخول
    // ══════════════════════════════════════════════════════════════
    async function doLogin() {
      const username = document.getElementById('usernameSelect').value;
      const password = document.getElementById('passwordInput').value;
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginButton');
      
      // التحقق من المدخلات
      if (!username) {
        errorMsg.textContent = '⚠️ يرجى اختيار المستخدم';
        return;
      }
      
      if (!password) {
        errorMsg.textContent = '⚠️ يرجى إدخال الرقم السري';
        return;
      }
      
      // التحقق من الإقفال
      if (loginAttempts.lockedUntil && Date.now() < loginAttempts.lockedUntil) {
        errorMsg.textContent = '🔒 الحساب مقفل مؤقتاً';
        return;
      }
      
      try {
        // تعطيل الزر أثناء المعالجة
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';
        
        // البحث عن المستخدم
        const users = await window.dbManager.getAll('users');
        const user = users.find(u => u.username === username);
        
        if (!user) {
          errorMsg.textContent = '❌ المستخدم غير موجود';
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>دخول</span><i class="fa-solid fa-arrow-left"></i>';
          return;
        }
        
        // التحقق من كلمة المرور
        const isValid = await window.passwordManager.verify(password, user.password);
        
        if (isValid) {
          // تسجيل الدخول ناجح
          resetAttempts();
          
          // حفظ الجلسة
          window.sessionManager.login({
            id: user.id,
            username: user.username,
            role: user.role
          });
          
          // حفظ آخر مستخدم إذا تم اختيار "تذكرني"
          if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('posdz_last_user', username);
          }
          
          // عرض رسالة نجاح
          window.toast.show(`مرحباً ${user.username}!`, 'success', 1500);
          
          // إشعار بتسجيل الدخول
          if (window.notificationManager) {
            window.notificationManager.push(
              `login_${Date.now()}`,
              '👤',
              'دخول مستخدم',
              `${user.username} — دخل في ${new Date().toLocaleTimeString('ar-DZ')}`,
              'info'
            );
          }
          
          // التوجيه إلى الصفحة الرئيسية
          setTimeout(() => {
            window.location.href = 'sale.html';
          }, 1000);
          
        } else {
          // تسجيل الدخول فاشل
          recordFailedAttempt();
          errorMsg.textContent = '❌ الرقم السري غير صحيح';
          document.getElementById('passwordInput').value = '';
          document.getElementById('passwordInput').focus();
          
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>دخول</span><i class="fa-solid fa-arrow-left"></i>';
        }
        
      } catch (e) {
        console.error('خطأ في تسجيل الدخول:', e);
        errorMsg.textContent = '❌ حدث خطأ، حاول مرة أخرى';
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>دخول</span><i class="fa-solid fa-arrow-left"></i>';
      }
    }

    // ══════════════════════════════════════════════════════════════
    //  دوال مساعدة
    // ══════════════════════════════════════════════════════════════
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const btn = document.getElementById('toggleEye');
      
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    function vkbPress(key) {
      const target = document.activeElement;
      if (!target || target.tagName !== 'INPUT') return;
      
      if (key === '⌫') {
        const start = target.selectionStart;
        const end = target.selectionEnd;
        target.value = target.value.substring(0, start) + target.value.substring(end);
        target.setSelectionRange(start, start);
      } else {
        const start = target.selectionStart;
        target.value = target.value.substring(0, start) + key + target.value.substring(target.selectionEnd);
        target.setSelectionRange(start + key.length, start + key.length);
      }
      
      target.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function vkbClose() {
      document.getElementById('vkbOverlay').classList.remove('open');
    }

    function initVirtualKeyboard() {
      document.addEventListener('focusin', async (e) => {
        if (e.target.tagName !== 'INPUT') return;
        
        const enabled = await window.dbManager.get('settings', 'touchKeyboard');
        if (enabled?.value === '1') {
          document.getElementById('vkbOverlay').classList.add('open');
        }
      });
    }

    // ══════════════════════════════════════════════════════════════
    //  ربط الأحداث
    // ══════════════════════════════════════════════════════════════
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.target.closest('.vkb-key')) {
        e.preventDefault();
        doLogin();
      }
    });

    // تصدير الدوال العامة
    window.doLogin = doLogin;
    window.togglePassword = togglePassword;
    window.vkbPress = vkbPress;
    window.vkbClose = vkbClose;
  </script>
</body>
</html>
