<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="shortcut icon" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POS DZ - واجهة البيع</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    /* تخطيط متطور */
    .sale-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sale-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
      overflow: hidden;
      background: var(--bg-dark);
    }

    /* شريط البحث المتقدم */
    .search-section {
      display: flex;
      gap: 10px;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .search-wrapper {
      flex: 1;
      position: relative;
      min-width: 280px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0 15px;
      transition: all 0.2s ease;
    }

    .search-box:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .search-box i {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 10px;
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    /* الكمية السريعة */
    .quick-qty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 2px solid var(--primary);
      border-radius: var(--radius);
      padding: 4px 12px;
      min-width: 100px;
    }

    .quick-qty-label {
      font-size: 0.6rem;
      color: var(--text-secondary);
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .quick-qty-control {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .quick-qty-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quick-qty-btn.minus:hover {
      background: var(--danger);
      color: #fff;
    }

    .quick-qty-btn.plus:hover {
      background: var(--success);
      color: #fff;
    }

    .quick-qty-input {
      width: 40px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--primary-light);
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
    }
    .quick-qty-input::-webkit-outer-spin-button,
    .quick-qty-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* قائمة الاقتراحات */
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--bg-card);
      border: 2px solid var(--primary);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      max-height: 300px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .autocomplete-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .autocomplete-item:hover {
      background: rgba(124, 58, 237, 0.15);
    }

    .autocomplete-item .product-name {
      font-weight: 700;
      color: var(--text-primary);
    }

    .autocomplete-item .product-price {
      color: var(--primary-light);
      font-weight: 800;
    }

    .autocomplete-item .product-stock {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
    }

    /* شريط الميزان */
    .scale-bar {
      display: none;
      align-items: center;
      gap: 15px;
      background: var(--bg-card);
      border: 2px solid var(--primary);
      border-radius: var(--radius);
      padding: 10px 18px;
      flex-wrap: wrap;
    }

    .scale-bar.visible {
      display: flex;
    }

    .scale-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scale-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
    }

    .scale-dot.connected {
      background: var(--success);
      box-shadow: 0 0 10px var(--success);
    }

    .scale-weight {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary-light);
      font-family: 'Impact', sans-serif;
      min-width: 100px;
      text-align: center;
    }

    .scale-price {
      width: 90px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 8px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .scale-price:focus {
      border-color: var(--primary);
    }

    /* منطقة السلة */
    .cart-area {
      flex: 1;
      overflow: auto;
      background: var(--bg-medium);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      position: relative;
    }

    .cart-header {
      display: grid;
      grid-template-columns: 2fr 80px 100px 80px 120px 100px 100px 50px;
      gap: 10px;
      padding: 12px 15px;
      background: var(--bg-dark);
      border-bottom: 3px solid var(--primary);
      color: var(--text-secondary);
      font-weight: 800;
      font-size: 0.85rem;
      position: sticky;
      top: 0;
      z-index: 10;
      min-width: 900px;
    }

    .cart-items {
      padding: 5px 0;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 2fr 80px 100px 80px 120px 100px 100px 50px;
      gap: 10px;
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      min-width: 900px;
      transition: background 0.15s;
    }

    .cart-item:hover {
      background: rgba(124, 58, 237, 0.05);
    }

    .cart-item .product-info {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cart-item .product-name {
      font-weight: 800;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .cart-item .product-family {
      font-size: 0.7rem;
      color: var(--primary-light);
      background: rgba(124, 58, 237, 0.1);
      padding: 2px 8px;
      border-radius: 12px;
      display: inline-block;
      width: fit-content;
    }

    .cart-item .qty-control {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .cart-item .qty-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cart-item .qty-btn.minus:hover {
      background: var(--danger);
      color: #fff;
    }

    .cart-item .qty-btn.plus:hover {
      background: var(--success);
      color: #fff;
    }

    .cart-item .qty-value {
      width: 40px;
      height: 30px;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-weight: 800;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
    }
    .cart-item .qty-value::-webkit-outer-spin-button,
    .cart-item .qty-value::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .cart-item .price-input {
      width: 90px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 6px 8px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .cart-item .price-input:focus {
      border-color: var(--primary);
    }

    .cart-item .item-total {
      font-weight: 900;
      color: var(--primary-light);
      font-size: 1rem;
      text-align: center;
    }

    .cart-item .delete-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--danger);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-item .delete-btn:hover {
      background: var(--danger);
      color: #fff;
    }

    /* الشريط السفلي */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      flex-wrap: wrap;
    }

    .items-count {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: var(--primary-light);
      font-weight: 800;
      padding: 6px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .discount-section {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 250px;
    }

    .discount-section label {
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .discount-section input {
      width: 90px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 8px 10px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .discount-section input:focus {
      border-color: var(--primary);
    }

    .discount-pills {
      display: flex;
      gap: 5px;
    }

    .disc-pill {
      padding: 5px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .disc-pill:hover,
    .disc-pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .total-section {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      margin-right: auto;
    }

    .total-label {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .total-amount {
      font-family: 'Impact', sans-serif;
      font-size: 2.5rem;
      color: var(--primary-light);
      text-shadow: 0 0 15px var(--glow);
      line-height: 1;
    }

    .discount-badge {
      font-size: 0.7rem;
      color: var(--warning);
      font-weight: 700;
    }

    /* صف الزبون والدفع */
    .customer-row {
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      flex-wrap: wrap;
    }

    .customer-row label {
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .customer-row input {
      width: 110px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 8px 12px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .customer-row input:focus {
      border-color: var(--primary);
    }

    .customer-select {
      position: relative;
      min-width: 200px;
    }

    .customer-select select {
      width: 100%;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 8px 12px;
      font-weight: 600;
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    .customer-select:after {
      content: '▼';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 0.7rem;
      pointer-events: none;
    }

    /* الشريط الموحد (صنف + زبون + ديون + إجمالي) */
    .unified-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      flex-wrap: nowrap;
    }

    .unified-bar .total-section {
      margin-right: auto;
    }

    /* شريط F6 فوق رأس السلة */
    .cart-toolbar {
      display: flex;
      justify-content: flex-end;
      padding: 6px 15px 0;
      background: var(--bg-dark);
    }

    .f6-toolbar-btn {
      background: rgba(34,211,238,0.1);
      color: #22D3EE;
      border-color: #22D3EE;
      padding: 5px 12px;
      font-size: 0.8rem;
    }


    .debt-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      padding: 8px 15px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .debt-btn:hover {
      background: var(--danger);
      color: #fff;
    }

    /* أزرار الإجراءات */
    .action-btns {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .action-btn {
      padding: 16px 10px;
      border: none;
      border-radius: var(--radius);
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .action-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .action-btn .fkey {
      position: absolute;
      top: 5px;
      left: 8px;
      font-size: 0.6rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    .btn-checkout {
      background: linear-gradient(135deg, var(--success), #047857);
      color: #fff;
    }

    .btn-partial {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
    }

    .btn-debt {
      background: linear-gradient(135deg, var(--warning), #b45309);
      color: #fff;
    }

    .btn-hold {
      background: linear-gradient(135deg, #6b7280, #4b5563);
      color: #fff;
    }

    .btn-held {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: #fff;
    }

    /* Modal تحسينات */
    .modal-lg {
      max-width: 700px;
    }

    .checkout-summary {
      text-align: center;
      margin-bottom: 20px;
    }

    .checkout-amount {
      font-family: 'Impact', sans-serif;
      font-size: 3rem;
      color: var(--primary-light);
      text-shadow: 0 0 20px var(--glow);
    }

    .checkout-items {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .change-display {
      margin-top: 15px;
      padding: 15px;
      border-radius: var(--radius-sm);
      text-align: center;
      display: none;
    }

    .change-display.positive {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .change-display.negative {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* سجل الفواتير */
    .history-card {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .history-card:hover {
      border-color: var(--primary);
    }

    .history-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-number {
      font-weight: 900;
      color: var(--primary-light);
      font-size: 1rem;
    }

    .history-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .history-total {
      font-family: 'Impact', sans-serif;
      font-size: 1.2rem;
      color: var(--primary-light);
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .status-paid {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .status-debt {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .status-partial {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    /* تذييل الصفحة */
    .app-footer {
      display: none;
    }
  </style>
</head>
<body>
<div class="bg-animated"></div>

<div class="sale-layout">
  <!-- الهيدر -->
  <header class="app-header">
    <button class="menu-btn" id="menuBtn">
      <i class="fa-solid fa-bars"></i>
    </button>
    
    <button id="_notifBell" class="notif-bell">
      <i class="fa-solid fa-bell"></i>
      <span id="_notifBadge" class="notif-badge"></span>
    </button>
    
    <span class="store-name" id="headerStoreName">جاري التحميل...</span>
    
    <div class="invoice-badge">
      <span class="invoice-label">فاتورة</span>
      <span class="invoice-number" id="headerInvoiceNum">#001</span>
    </div>
    
    <div class="invoice-nav">
      <button class="inv-nav-btn" id="invNavPrev" onclick="navigateInvoice('prev')" disabled>
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <button class="inv-nav-btn" id="invNavNext" onclick="navigateInvoice('next')" disabled>
        <i class="fa-solid fa-chevron-left"></i>
      </button>
    </div>
    
    <button class="history-btn" onclick="openInvoiceHistory()">
      <i class="fa-solid fa-clock-rotate-left"></i>
      <span>السجل</span>
    </button>
    
    <div class="app-brand">
      <span class="brand-title">POS DZ</span>
      <span class="brand-clock" id="clockDisplay"></span>
    </div>
  </header>

  <!-- المحتوى الرئيسي -->
  <div class="sale-body">
    
    <!-- شريط البحث والكمية السريعة -->
    <div class="search-section">
      <div class="search-wrapper">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchInput" 
                 placeholder="ابحث عن منتج أو امسح الباركود..."
                 autocomplete="off"/>
          <i class="fa-solid fa-barcode" style="cursor:pointer; opacity:0.7;"></i>
        </div>
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>
      
      <div class="quick-qty">
        <span class="quick-qty-label">الكمية</span>
        <div class="quick-qty-control">
          <button class="quick-qty-btn minus" onclick="adjustQuickQty(-1)">−</button>
          <input type="number" id="quickQty" class="quick-qty-input" value="1" min="1" max="999"/>
          <button class="quick-qty-btn plus" onclick="adjustQuickQty(1)">+</button>
        </div>
      </div>
    </div>
    
    <!-- شريط الميزان (مخفي افتراضياً) -->
    <!-- منطقة السلة (مع زر طارئ F6 في الأعلى) -->
    <div class="cart-area">
      <div class="cart-toolbar">
        <button class="debt-btn f6-toolbar-btn" onclick="openF6Modal()">
          <span style="background:rgba(255,255,255,0.2); padding:2px 6px; border-radius:4px; font-family:monospace;">F6</span>
          <i class="fa-solid fa-bolt"></i> طارئ
        </button>
      </div>
      <div class="cart-header">
        <span>العائلة / المنتج</span>
        <span style="text-align:center; white-space:nowrap;">الحجم / الوحدة</span>
        <span style="text-align:center;">سعر الشراء</span>

<script>
// ══════════════════════════════════════════════════════════════
//  POS DZ - sale.js  v8.0.0  (محسن بالكامل)
// ══════════════════════════════════════════════════════════════

// متغيرات عامة
let cart = [];
let allProducts = [];
let allCustomers = [];
let allFamilies = [];
let heldSales = [];
let currentInvoiceNumber = '#001';
let lastSaleId = null;
let searchTimeout = null;

// ══════════════════════════════════════════════════════════════
//  التهيئة
// ══════════════════════════════════════════════════════════════
async function init() {
  // التحقق من الجلسة
  if (!window.sessionManager.requireAuth()) return;
  
  // تهيئة التطبيق
  await window.initApp();
  
  // تحميل البيانات
  await loadData();
  
  // تحميل السلة المحفوظة
  loadCartFromStorage();
  
  // تهيئة الواجهة
  renderCart();
  updateTotal();
  await loadCustomerSelect();
  await updateInvoiceNumber();
  
  // تهيئة الأحداث
  initSearch();
  initKeyboardShortcuts();
  initBarcodeScanner();
  initScale();
  
  // تحميل المبيعات المعلقة
  loadHeldSales();
  
  console.log('✅ واجهة البيع جاهزة');
}

// ══════════════════════════════════════════════════════════════
//  تحميل البيانات
// ══════════════════════════════════════════════════════════════
async function loadData() {
  allProducts = await window.dbManager.getAll('products');
  allCustomers = await window.dbManager.getAll('customers');
  allFamilies = await window.dbManager.getAll('families');
  
  // إثراء المنتجات بأسماء العائلات
  allProducts = allProducts.map(p => ({
    ...p,
    familyName: allFamilies.find(f => f.id === p.familyId)?.name || ''
  }));
}

// ══════════════════════════════════════════════════════════════
//  إدارة السلة
// ══════════════════════════════════════════════════════════════
function loadCartFromStorage() {
  try {
    const saved = sessionStorage.getItem('posdz_cart');
    if (saved) {
      cart = JSON.parse(saved);
    }
  } catch (e) {
    cart = [];
  }
}

function saveCartToStorage() {
  sessionStorage.setItem('posdz_cart', JSON.stringify(cart));
}

function renderCart() {
  const container = document.getElementById('cartItems');
  
  if (cart.length === 0) {
    container.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; color:var(--text-secondary);">
        <i class="fa-solid fa-cart-shopping" style="font-size:3rem; opacity:0.3; margin-bottom:15px;"></i>
        <p style="font-size:1rem; font-weight:600;">السلة فارغة</p>
        <p style="font-size:0.8rem;">ابحث عن منتج وأضفه للبدء</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = cart.map((item, index) => {
    const product = allProducts.find(p => p.id === item.productId);
    const stock = product ? product.quantity : 0;
    const remaining = stock - item.quantity;
    const stockColor = remaining <= 0 ? 'var(--danger)' : remaining <= 5 ? 'var(--warning)' : 'var(--text-secondary)';
    
    return `
      <div class="cart-item">
        <div class="product-info">
          ${item.familyName ? `<span class="product-family">${window.sanitizer.escape(item.familyName)}</span>` : ''}
          <span class="product-name">${window.sanitizer.escape(item.name)}</span>
        </div>
        
        <div style="text-align:center; color:var(--text-secondary);">
          ${item.size ? window.sanitizer.escape(item.size) + (item.unit ? ' ' + window.sanitizer.escape(item.unit) : '') : (item.unit ? window.sanitizer.escape(item.unit) : '—')}
        </div>
        
        <div style="text-align:center; color:#60a5fa;">
          ${item.buyPrice ? window.currencyFormatter.formatWithoutSymbol(item.buyPrice) : '—'}
        </div>
        
        <div style="text-align:center; color:${stockColor}; font-weight:700;">
          ${remaining > 0 ? remaining : 'نفد'}
        </div>
        
        <div class="qty-control">
          <button class="qty-btn minus" onclick="adjustQuantity(${index}, -1)">−</button>
          <input type="number" class="qty-value" value="${item.quantity}" 
                 min="1" max="${stock}" onchange="updateQuantity(${index}, this.value)"/>
          <button class="qty-btn plus" onclick="adjustQuantity(${index}, 1)">+</button>
        </div>
        
        <input type="number" class="price-input" value="${item.unitPrice.toFixed(2)}" 
               min="0" step="0.01" onchange="updatePrice(${index}, this.value)"/>
        
        <span class="item-total">${window.currencyFormatter.formatWithoutSymbol(item.total)}</span>
        
        <button class="delete-btn" onclick="removeFromCart(${index})">
          <i class="fa-solid fa-trash-can"></i>
        </button>
      </div>
    `;
  }).join('');
}

function addToCart(product, quantity = null) {
  const qty = quantity || parseInt(document.getElementById('quickQty').value) || 1;
  
  if (product.quantity < qty) {
    window.toast.show(`⚠️ الكمية المتاحة: ${product.quantity} فقط`, 'warning');
    return;
  }
  
  const existing = cart.findIndex(i => i.productId === product.id);
  
  if (existing >= 0) {
    const newQty = cart[existing].quantity + qty;
    if (newQty > product.quantity) {
      window.toast.show(`⚠️ الكمية المتاحة: ${product.quantity} فقط`, 'warning');
      return;
    }
    cart[existing].quantity = newQty;
    cart[existing].total = newQty * cart[existing].unitPrice;
  } else {
    cart.push({
      productId: product.id,
      name: product.name,
      familyName: product.familyName,
      size: product.size,
      unit: product.unit || '',
      quantity: qty,
      unitPrice: product.sellPrice,
      buyPrice: product.buyPrice,
      total: qty * product.sellPrice
    });
  }
  
  saveCartToStorage();
  renderCart();
  updateTotal();
  window.toast.show(`✅ تمت إضافة ${product.name}`, 'success', 1500);
}

function adjustQuantity(index, delta) {
  const item = cart[index];
  if (!item) return;
  const product = allProducts.find(p => p.id === item.productId);
  const newQty = item.quantity + delta;
  
  if (newQty <= 0) {
    // لا نحذف تلقائياً — الحذف فقط بزر سلة المهملات
    return;
  }
  
  if (product && newQty > product.quantity) {
    window.toast.show(`⚠️ الكمية المتاحة: ${product.quantity} فقط`, 'warning');
    return;
  }
  
  item.quantity = newQty;
  item.total = newQty * item.unitPrice;
  saveCartToStorage();
  renderCart();
  updateTotal();
}

function updateQuantity(index, value) {
  const qty = parseInt(value) || 1;
  const item = cart[index];
  const product = allProducts.find(p => p.id === item.productId);
  
  if (product && qty > product.quantity) {
    window.toast.show(`⚠️ الكمية المتاحة: ${product.quantity} فقط`, 'warning');
    renderCart();
    return;
  }
  
  item.quantity = qty;
  item.total = qty * item.unitPrice;
  saveCartToStorage();
  renderCart();
  updateTotal();
}

function updatePrice(index, value) {
  const price = parseFloat(value) || 0;
  const item = cart[index];
  item.unitPrice = price;
  item.total = item.quantity * price;
  saveCartToStorage();
  renderCart();
  updateTotal();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCartToStorage();
  renderCart();
  updateTotal();
}

function clearCart() {
  cart = [];
  sessionStorage.removeItem('posdz_cart');
  document.getElementById('discountInput').value = '';
  document.getElementById('paidInput').value = '';
  document.getElementById('customerSelect').value = '';
  renderCart();
  updateTotal();
}

// ══════════════════════════════════════════════════════════════
//  الحسابات
// ══════════════════════════════════════════════════════════════
function getTotals() {
  const subtotal = cart.reduce((sum, item) => sum + item.total, 0);
  const discount = parseFloat(document.getElementById('discountInput').value) || 0;
  const total = Math.max(0, subtotal - discount);
  return { subtotal, discount, total };
}

function updateTotal() {
  const { subtotal, discount, total } = getTotals();
  const itemsCount = cart.reduce((sum, item) => sum + item.quantity, 0);
  
  document.getElementById('totalAmount').textContent = window.currencyFormatter.format(total);
  document.getElementById('itemsCount').textContent = `${itemsCount} صنف (${cart.length})`;
  
  if (discount > 0) {
    document.getElementById('discountBadge').textContent = `خصم: -${window.currencyFormatter.formatWithoutSymbol(discount)}`;
  } else {
    document.getElementById('discountBadge').textContent = '';
  }
}

function applyDiscountPercent(percent) {
  const { subtotal } = getTotals();
  const discount = (subtotal * percent) / 100;
  document.getElementById('discountInput').value = discount.toFixed(2);
  updateTotal();
}

// ══════════════════════════════════════════════════════════════
//  البحث
// ══════════════════════════════════════════════════════════════
function initSearch() {
  const input = document.getElementById('searchInput');
  const list = document.getElementById('autocompleteList');
  
  input.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const query = input.value.trim().toLowerCase();
    
    if (query.length < 2) {
      list.style.display = 'none';
      return;
    }
    
    searchTimeout = setTimeout(() => {
      const matches = allProducts
        .filter(p => p.name.toLowerCase().includes(query) || (p.barcode && p.barcode.includes(query)))
        .slice(0, 8);
      
      if (matches.length === 0) {
        list.style.display = 'none';
        return;
      }
      
      list.innerHTML = matches.map(p => {
        const inCart = cart.find(i => i.productId === p.id);
        const used = inCart ? inCart.quantity : 0;
        const available = p.quantity - used;
        
        return `
          <div class="autocomplete-item" onclick="selectProduct(${p.id})">
            <span class="product-name">${window.sanitizer.escape(p.name)}</span>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="product-stock" style="color:${available <= 0 ? 'var(--danger)' : available <= 5 ? 'var(--warning)' : 'var(--text-secondary)'}">
                📦 ${available}
              </span>
              <span class="product-price">${window.currencyFormatter.formatWithoutSymbol(p.sellPrice)}</span>
            </div>
          </div>
        `;
      }).join('');
      
      list.style.display = 'block';
    }, 300);
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && list.children.length > 0) {
      const firstId = parseInt(list.firstChild.getAttribute('onclick').match(/\d+/)[0]);
      selectProduct(firstId);
    }
  });
  
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) {
      list.style.display = 'none';
    }
  });
}

function selectProduct(id) {
  const product = allProducts.find(p => p.id === id);
  if (product) {
    addToCart(product);
    document.getElementById('searchInput').value = '';
    document.getElementById('autocompleteList').style.display = 'none';
  }
}

function adjustQuickQty(delta) {
  const input = document.getElementById('quickQty');
  const val = parseInt(input.value) || 1;
  const newVal = Math.max(1, Math.min(999, val + delta));
  input.value = newVal;
}

// ══════════════════════════════════════════════════════════════
//  الزبائن
// ══════════════════════════════════════════════════════════════
async function loadCustomerSelect() {
  const select = document.getElementById('customerSelect');
  select.innerHTML = '<option value="">-- اختر الزبون --</option>';
  
  allCustomers.forEach(c => {
    const option = document.createElement('option');
    option.value = c.id;
    option.textContent = c.name;
    select.appendChild(option);
  });

function updateHeldSalesBadge() {

function holdCurrentSale() {
  if (cart.length === 0) {

  const { discount } = getTotals();

function openHeldSalesModal() {

  const content = document.getElementById('heldSalesContent');

          </button>
        </div>
      </div>
    `;
  }).join('');
  
  window.modalManager.open('heldSalesModal');
}

async function resumeHeldSale(index) {
  const sale = heldSales[index];
  
  // التحقق من توفر المنتجات
  for (const item of sale.cart) {
    const product = await window.dbManager.get('products', item.productId);
    if (product && product.quantity < item.quantity) {
      if (!await window.modalManager.confirm(`⚠️ المنتج ${item.name} متوفر منه ${product.quantity} فقط. هل تريد المتابعة؟`)) {
        return;
      }
    }
  }
  
  cart = sale.cart;
  document.getElementById('discountInput').value = sale.discount || '';
  document.getElementById('customerSelect').value = sale.customerId || '';
  
  heldSales.splice(index, 1);
  localStorage.setItem('posdz_held_sales', JSON.stringify(heldSales));
  
  saveCartToStorage();
  renderCart();
  updateTotal();
  updateHeldSalesBadge();
  window.modalManager.close('heldSalesModal');
  window.toast.show('✅ تم استئناف البيع', 'success');
}

function deleteHeldSale(index) {
  heldSales.splice(index, 1);
  localStorage.setItem('posdz_held_sales', JSON.stringify(heldSales));
  updateHeldSalesBadge();
  openHeldSalesModal();
}

function openCheckout() {
  if (cart.length === 0) {
    window.toast.show('السلة فارغة', 'warning');
    return;
  }
  
  const { total } = getTotals();
  
  document.getElementById('checkoutSummary').innerHTML = `
    <div class="checkout-amount">${window.currencyFormatter.formatWithoutSymbol(total)}</div>
    <div class="checkout-items">
      <i class="fa-solid fa-cart-shopping"></i> ${cart.length} صنف
    </div>
  `;
  
  document.getElementById('receivedAmount').value = '';
  document.getElementById('changeDisplay').style.display = 'none';
  window.modalManager.open('checkoutModal');
  setTimeout(() => document.getElementById('receivedAmount').focus(), 200);
}

function calculateChange() {
  const { total } = getTotals();
  const received = parseFloat(document.getElementById('receivedAmount').value) || 0;
  const change = received - total;
  const display = document.getElementById('changeDisplay');
  
  if (received > 0) {
    display.style.display = 'block';
    
    if (change >= 0) {
      display.className = 'change-display positive';
      document.getElementById('changeLabel').textContent = 'الباقي للزبون:';
      document.getElementById('changeAmount').textContent = window.currencyFormatter.format(change);
    } else {
      display.className = 'change-display negative';
      document.getElementById('changeLabel').textContent = 'ناقص:';
      document.getElementById('changeAmount').textContent = window.currencyFormatter.format(Math.abs(change));
    }
  } else {
    display.style.display = 'none';
  }
}

async function confirmSale(print = true) {
  const { total, discount } = getTotals();
  const received = parseFloat(document.getElementById('receivedAmount').value) || 0;
  const paid = received >= total ? total : received;
  const change = received > total ? received - total : 0;
  const customerId = parseInt(document.getElementById('customerSelect').value) || null;
  
  if (received > 0 && paid < total && customerId === null) {
    window.toast.show('يجب اختيار زبون للدفع الجزئي', 'warning');
    return;
  }
  
  try {
    // إنشاء الفاتورة
    const invoiceNumber = await window.getNextInvoiceNumber();
    const user = window.sessionManager.getUser();
    const now = window.dateUtils.now();
    
    const saleId = await window.dbManager.add('sales', {
      invoiceNumber,
      userId: user.id,
      customerId: customerId || 0,
      total,
      discount,
      paid,
      change,
      isDebt: paid < total ? 1 : 0,
      isCancelled: 0,
      date: now
    });
    
    // إضافة العناصر وتحديث المخزون
    for (const item of cart) {
      await window.dbManager.add('saleItems', {
        saleId,
        productId: item.productId,
        productName: item.name,
        quantity: item.quantity,
        unitPrice: item.unitPrice,
        total: item.total
      });
      
      if (item.productId > 0) {
        const product = await window.dbManager.get('products', item.productId);
        if (product) {
          product.quantity -= item.quantity;
          await window.dbManager.put('products', product);
        }
      }
    }
    
    // تسجيل الدين إذا لزم الأمر
    if (paid < total) {
      await window.dbManager.add('debts', {
        customerId,
        saleId,
        amount: total - paid,
        originalAmount: total,
        paidAtSale: paid,
        isPaid: 0,
        date: now
      });
    }
    
    lastSaleId = saleId;
    
    // طباعة الفاتورة
    if (print) {
      const customer = allCustomers.find(c => c.id === customerId);
      const sale = {
        invoiceNumber,
        total,
        discount,
        paid,
        change,
        isDebt: paid < total ? 1 : 0,
        date: now,
        customerName: customer ? customer.name : '',
        customerPhone: customer ? customer.phone : ''
      };
      
      await printInvoice(sale, cart);
    }
    
    window.modalManager.close('checkoutModal');
    window.toast.show(`✅ تم البيع - فاتورة ${invoiceNumber}`, 'success', 3000);
    
    clearCart();
    await updateInvoiceNumber();
    
  } catch (e) {
    console.error('خطأ في البيع:', e);
    window.toast.show('❌ فشل في إتمام البيع', 'error');
  }
}

async function partialPayment() {
  const customerId = parseInt(document.getElementById('customerSelect').value);
  if (!customerId) {
    window.toast.show('يجب اختيار زبون للدفع الجزئي', 'warning');
    return;
  }
  
  const paid = parseFloat(document.getElementById('paidInput').value) || 0;
  if (paid <= 0) {
    window.toast.show('أدخل المبلغ المدفوع', 'warning');

  if (paid >= total) {

  }
  
  document.getElementById('receivedAmount').value = paid;
  openCheckout();
}

async function updateInvoiceNumber() {
  const counter = await window.dbManager.get('counter', 1);
  const today = window.dateUtils.today();
  
  if (!counter) {
    currentInvoiceNumber = '#001';
  } else if (counter.lastReset !== today) {
    currentInvoiceNumber = '#001';
  } else {
    currentInvoiceNumber = '#' + String(counter.number).padStart(3, '0');
  }
  
  document.getElementById('headerInvoiceNum').textContent = currentInvoiceNumber;
}

let historyData = [];

async function openInvoiceHistory() {
  const sales = await window.dbManager.getAll('sales');
  const items = await window.dbManager.getAll('saleItems');
  
  historyData = sales
    .filter(s => !s.isCancelled)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 50)
    .map(sale => {
      const saleItems = items.filter(i => i.saleId === sale.id);
      const customer = allCustomers.find(c => c.id === sale.customerId);
      return { sale, items: saleItems, customerName: customer ? customer.name : '' };
    });
  
  renderHistoryList(historyData);
  window.modalManager.open('invoiceHistoryModal');
}

function filterHistory() {
  const query = document.getElementById('historySearch').value.trim().toLowerCase();
  
  if (!query) {
    renderHistoryList(historyData);
    return;
  }
  
  const filtered = historyData.filter(({ sale, customerName }) => 
    sale.invoiceNumber.toLowerCase().includes(query) ||
    customerName.toLowerCase().includes(query)
  );
  
  renderHistoryList(filtered);
}

function renderHistoryList(list) {
  const container = document.getElementById('historyList');
  
  if (list.length === 0) {
    container.innerHTML = `
      <div style="text-align:center; padding:50px;">
        <i class="fa-solid fa-inbox" style="font-size:3rem; opacity:0.3;"></i>
        <p style="margin-top:15px; color:var(--text-secondary);">لا توجد فواتير</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = list.map(({ sale, items, customerName }) => {
    let statusClass = 'status-paid';
    let statusText = 'مسددة';
    
    if (sale.isDebt && sale.paid === 0) {
      statusClass = 'status-debt';
      statusText = 'دين';
    } else if (sale.isDebt && sale.paid > 0) {
      statusClass = 'status-partial';
      statusText = 'جزئي';
    }
    
    return `
      <div class="history-card" onclick="viewInvoiceDetail(${sale.id})">
        <div class="history-info">
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">

      </div>

  }).join('');

function initKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // تجاهل إذا كان المستخدم يكتب في حقل
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
      if (e.key === 'Escape') {
        e.target.blur();
      }
      return;
    }
    
    switch (e.key) {
      case 'F1':
        e.preventDefault();
        openCheckout();
        break;
      case 'F2':
        e.preventDefault();
        partialPayment();
        break;
      case 'F3':
        e.preventDefault();
        registerDebt();
        break;
      case 'F4':
        e.preventDefault();
        holdCurrentSale();
        break;
      case 'F5':
        e.preventDefault();
        openHeldSalesModal();
        break;
      case 'F6':
        e.preventDefault();
        openF6Modal();
        break;
      case 'Escape':
        e.preventDefault();
        const openModal = document.querySelector('.modal-overlay.open');
        if (openModal) {
          window.modalManager.close(openModal.id);
        } else {
          document.getElementById('searchInput').focus();
        }
        break;
    }
  });
}

let barcodeBuffer = '';
let barcodeTimer = null;

function initBarcodeScanner() {
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    
    if (e.key === 'Enter') {
      if (barcodeBuffer.length > 2) {
        const product = allProducts.find(p => p.barcode === barcodeBuffer);
        if (product) {
          addToCart(product);
        } else {
          window.toast.show(`الباركود غير موجود: ${barcodeBuffer}`, 'warning');
        }
        barcodeBuffer = '';
        clearTimeout(barcodeTimer);
      }
    } else if (e.key.length === 1) {
      barcodeBuffer += e.key;
      clearTimeout(barcodeTimer);
      barcodeTimer = setTimeout(() => {
        barcodeBuffer = '';
      }, 100);
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  إعادة طباعة آخر فاتورة
// ══════════════════════════════════════════════════════════════
async function reprintLastInvoice() {
  if (!lastSaleId) {
    window.toast.show('لا توجد فاتورة سابقة', 'info');
    return;
  }
  
  const sale = await window.dbManager.get('sales', lastSaleId);
  const items = await window.dbManager.getAll('saleItems', { index: 'saleId', value: lastSaleId });
  const customer = allCustomers.find(c => c.id === sale.customerId);
  
  sale.customerName = customer ? customer.name : '';
  sale.customerPhone = customer ? customer.phone : '';
  
  await printInvoice(sale, items);
}

// ══════════════════════════════════════════════════════════════
//  تسجيل الخروج
// ══════════════════════════════════════════════════════════════
function doLogout() {
  window.modalManager.confirm('هل تريد تسجيل الخروج؟').then(confirmed => {
    if (confirmed) {
      window.sessionManager.logout();
    }
  });
}

//  بدء التشغيل
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
